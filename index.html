<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Soundboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            max-width: 860px;
            margin: 0 auto 2rem;
        }

        .sound-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.2s ease;
            gap: 0.5rem;
            position: relative;
            min-height: 130px;
        }

        .sound-btn:not(.placeholder):hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .sound-btn:not(.placeholder):active {
            transform: scale(0.96);
        }

        .sound-btn.playing {
            box-shadow: 0 0 0 4px white, 0 8px 24px rgba(0,0,0,0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px white, 0 8px 24px rgba(0,0,0,0.4); }
            50%       { box-shadow: 0 0 0 7px rgba(255,255,255,0.5), 0 8px 24px rgba(0,0,0,0.4); }
        }

        .sound-btn.placeholder {
            opacity: 0.35;
            cursor: default;
        }

        .emoji {
            font-size: 2.8rem;
            line-height: 1;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }

        .coming-soon {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.7;
            background: rgba(0,0,0,0.2);
            padding: 2px 7px;
            border-radius: 20px;
        }

        .stop-all-wrap {
            text-align: center;
        }

        .stop-all {
            padding: 0.75rem 2.5rem;
            background: #2a2a3a;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .stop-all:hover {
            background: #3a3a4a;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎵 Workshop Soundboard</h1>
        <p class="subtitle">Click to play &nbsp;·&nbsp; Click again to stop</p>
    </header>

    <div class="grid" id="grid"></div>

    <div class="stop-all-wrap">
        <button class="stop-all" onclick="stopAll()">⏹ Stop All Sounds</button>
    </div>

    <script>
        const sounds = [
            { emoji: '🛗', label: 'Elevator Music', file: 'elevator.mp3',     loop: true,  color: '#4ecdc4', ready: true },
            { emoji: '👏', label: 'Applause',        file: 'applause.mp3',     loop: false, color: '#ff6b6b', ready: true },
            { emoji: '😢', label: 'Sad Trombone',    file: 'sadtrombone.mp3',  loop: false, color: '#60a5fa', ready: false },
            { emoji: '🎉', label: 'Ta-da!',           file: 'tada.mp3',         loop: false, color: '#ffd93d', ready: false },
            { emoji: '⏰', label: 'Ticking Clock',   file: 'ticking.mp3',      loop: true,  color: '#c084fc', ready: false },
            { emoji: '🥁', label: 'Drumroll',         file: 'drumroll.mp3',     loop: false, color: '#fb923c', ready: false },
            { emoji: '😂', label: 'Laugh Track',      file: 'laugh.mp3',        loop: false, color: '#4ade80', ready: false },
            { emoji: '🔔', label: 'Ding!',            file: 'ding.mp3',         loop: false, color: '#f9a8d4', ready: false },
            { emoji: '📣', label: 'Countdown',        file: 'countdown.mp3',    loop: false, color: '#a3e635', ready: false },
            { emoji: '🎷', label: 'Lounge Jazz',      file: 'lounge.mp3',       loop: true,  color: '#e879f9', ready: false },
        ];

        const audioMap = {};
        const grid = document.getElementById('grid');

        sounds.forEach((sound, i) => {
            const btn = document.createElement('button');
            btn.className = 'sound-btn' + (sound.ready ? '' : ' placeholder');
            btn.style.background = sound.color;
            btn.style.color = isLight(sound.color) ? '#111' : '#fff';

            btn.innerHTML = `
                <span class="emoji">${sound.emoji}</span>
                <span class="label">${sound.label}</span>
                ${!sound.ready ? '<span class="coming-soon">coming soon</span>' : ''}
            `;

            if (sound.ready) {
                const audio = new Audio('sounds/' + sound.file);
                audio.loop = sound.loop;
                audioMap[i] = { audio, btn };

                audio.addEventListener('ended', () => btn.classList.remove('playing'));

                btn.addEventListener('click', () => {
                    if (btn.classList.contains('playing')) {
                        audio.pause();
                        audio.currentTime = 0;
                        btn.classList.remove('playing');
                    } else {
                        audio.play();
                        btn.classList.add('playing');
                    }
                });
            }

            grid.appendChild(btn);
        });

        function stopAll() {
            Object.values(audioMap).forEach(({ audio, btn }) => {
                audio.pause();
                audio.currentTime = 0;
                btn.classList.remove('playing');
            });
        }

        function isLight(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return (r * 299 + g * 587 + b * 114) / 1000 > 128;
        }
    </script>

</body>
</html>
